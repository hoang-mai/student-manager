
version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgres_student_manager
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: student_manager
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456789
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio_student_manager
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: student_manager
      MINIO_ROOT_PASSWORD: student_manager_secret
    volumes:
      - minio_data:/data


networks:
  es-net:
    driver: bridge
volumes:
  postgres_data:
  minio_data:
